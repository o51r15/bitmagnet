services:

  bitmagnet:
    image: ghcr.io/o51r15/bitmagnet:latest   # stability fork
    container_name: bitmagnet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Hard cap prevents bitmagnet from consuming all host RAM and
          # triggering a kernel OOM kill that takes down the whole machine.
          # 1.5GB is comfortable headroom for split workers at default scaling.
          # Raise to 2g if you increase dht_crawler.scaling_factor above 4.
          memory: 1536m
        reservations:
          memory: 256m
    ports:
      - "3333:3333"
      - "3334:3334/tcp"
      - "3334:3334/udp"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=postgres
      - TMDB_API_KEY=381d3ff27e9a8db578cc55018ae60386
    volumes:
      - ./config:/root/.config/bitmagnet
    command:
      - worker
      - run
      - --keys=http_server
      - --keys=queue_server
      - --keys=dht_crawler
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: bitmagnet-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Postgres is the real memory bottleneck. Give it dedicated headroom.
          # shared_buffers below is 512MB so the container limit must exceed that.
          # 2GB gives comfortable room for work_mem, connections, and OS page cache.
          memory: 2g
        reservations:
          memory: 1g
    # shm_size must be >= shared_buffers
    shm_size: 1g
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    #  - "5432:5432"   # uncomment to access DB directly
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bitmagnet
      - PGUSER=postgres
    command:
      - postgres
      # ---- Memory --------------------------------------------------------
      # shared_buffers: ~25% of container memory limit (2g = 512MB)
      - -c
      - shared_buffers=512MB
      # effective_cache_size: how much total RAM Postgres + OS can cache.
      # ~75% of container limit. Helps the query planner make better decisions.
      - -c
      - effective_cache_size=1536MB
      # work_mem: per-sort/per-hash memory. Keep low so concurrent connections
      # don't multiply into OOM. 16MB x 50 connections = 800MB worst case.
      - -c
      - work_mem=16MB
      # maintenance_work_mem: used by VACUUM, CREATE INDEX, etc.
      - -c
      - maintenance_work_mem=128MB
      # ---- Connections ---------------------------------------------------
      # bitmagnet uses a small internal pool. 50 is plenty and prevents
      # connection storms from spiking RAM.
      - -c
      - max_connections=50
      # ---- WAL / Checkpoints ---------------------------------------------
      - -c
      - wal_buffers=16MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=2GB
      # ---- SSD optimisation ----------------------------------------------
      # Tells the planner random I/O is cheap — correct for NVMe/SSD.
      # Change to 4.0 if running on a spinning disk.
      - -c
      - random_page_cost=1.1
      # ---- Autovacuum ----------------------------------------------------
      # Bitmagnet writes millions of rows per day. Aggressive autovacuum
      # prevents table bloat which is one of the primary causes of long-term
      # query slowdown. These settings run autovacuum earlier and more often
      # than the defaults, at the cost of slightly more background I/O.
      - -c
      - autovacuum_vacuum_scale_factor=0.05
      - -c
      - autovacuum_analyze_scale_factor=0.025
      - -c
      - autovacuum_vacuum_cost_delay=2ms
      - -c
      - autovacuum_naptime=20s
      - -c
      - autovacuum_max_workers=3
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready
      start_period: 20s
      interval: 10s
