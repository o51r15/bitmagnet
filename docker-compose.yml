services:

  bitmagnet:
    image: ghcr.io/o51r15/bitmagnet:latest   # stability fork
    container_name: bitmagnet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 1GB hard cap on an 8GB host.
          # OS + Postgres (2GB) + bitmagnet (1GB) = ~3GB committed,
          # leaving ~5GB free for OS page cache and other services.
          memory: 1g
        reservations:
          memory: 256m
    ports:
      - "3333:3333"
      - "3334:3334/tcp"
      - "3334:3334/udp"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=postgres
      - TMDB_API_KEY=381d3ff27e9a8db578cc55018ae60386
    volumes:
      - ./config:/root/.config/bitmagnet
    command:
      - worker
      - run
      - --keys=http_server
      - --keys=queue_server
      - --keys=dht_crawler
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: bitmagnet-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 2GB for Postgres on an 8GB host.
          # shared_buffers is 512MB (~25% of limit) — do not exceed this ratio
          # or Postgres will fight with the OS page cache for the same pages.
          memory: 2g
        reservations:
          memory: 512m
    shm_size: 512m
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    #  - "5432:5432"   # uncomment to access DB directly
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bitmagnet
      - PGUSER=postgres
    command:
      - postgres
      # ---- Memory --------------------------------------------------------
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      # work_mem reduced to 8MB for 8GB host.
      # 50 connections x 8MB = 400MB worst case, well within limits.
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      # ---- Connections ---------------------------------------------------
      - -c
      - max_connections=50
      # ---- WAL / Checkpoints ---------------------------------------------
      - -c
      - wal_buffers=16MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=1GB
      # ---- SSD optimisation ----------------------------------------------
      - -c
      - random_page_cost=1.1
      # ---- Autovacuum ----------------------------------------------------
      - -c
      - autovacuum_vacuum_scale_factor=0.05
      - -c
      - autovacuum_analyze_scale_factor=0.025
      - -c
      - autovacuum_vacuum_cost_delay=2ms
      - -c
      - autovacuum_naptime=20s
      - -c
      - autovacuum_max_workers=2
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready
      start_period: 20s
      interval: 10s
