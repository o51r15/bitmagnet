name: Build and Push Stability Fork Image

# Builds and pushes a Docker image to GHCR on every push to main.
# Image lands at: ghcr.io/o51r15/bitmagnet:latest
#
# Also builds (but does not push) on pull requests so you can verify
# the build passes before merging.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag as 'latest' on main branch pushes
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with short commit SHA for traceability
            type=sha,prefix=sha-,format=short
            # Tag with branch name for non-main branches
            type=ref,event=branch
            type=ref,event=pr

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ci.Dockerfile
          # Build amd64 and arm64 — covers x86 servers and Raspberry Pi / NAS devices.
          # Remove arm64 if your target is x86-only to cut build time roughly in half.
          platforms: linux/amd64,linux/arm64
          # Only push on branch pushes, not PRs (PRs just verify the build)
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
